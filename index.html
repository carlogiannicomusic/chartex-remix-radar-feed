<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="referrer" content="no-referrer" />
<title>Remix Radar</title>
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Remix Radar" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@500;700;900&family=Space+Mono:wght@400;700&display=swap">

<style>
  :root{
    --bg:#000000; --bg-2:#0C0C0C; --bg-3:#171717; --bg-4:#1F1F1F;
    --text:#F5F5F5; --text-2:#BCBCBC; --mute:#7A7A7A;
    --line:#262626; --line-soft:#3A3A3A;
    --orange:#F23B1A; --orange-deep:#C42E10;
    --blue:#1B40E8; --blue-deep:#0E2BB8;
    --grey:#C4C4C4; --grey-2:#9A9A9A;
    --on-color:#000000;
    --display:'Archivo Black', Impact, sans-serif;
    --ui:'Archivo', system-ui, sans-serif;
    --mono:'Space Mono', ui-monospace, Menlo, monospace;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:var(--ui); font-size:14px; line-height:1.45;
    min-height:100svh;
    padding-bottom:calc(var(--safe-bottom) + 78px);
    overflow-x:hidden; -webkit-font-smoothing:antialiased;
    transition:padding-bottom .2s ease;
  }
  body[data-playing="1"]{ padding-bottom:calc(var(--safe-bottom) + 142px); }
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      repeating-linear-gradient(0deg, rgba(245,245,245,0.025) 0 1px, transparent 1px 3px),
      radial-gradient(1100px 600px at 88% -10%, rgba(27,64,232,0.10), transparent 60%),
      radial-gradient(900px 500px at -10% 100%, rgba(242,59,26,0.08), transparent 65%);
  }
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    opacity:.07;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  a{color:inherit;}
  .wrap{max-width:680px; margin:0 auto; padding:0 14px; position:relative; z-index:1;}

  /* ═══════════ MASTHEAD */
  header{
    position:sticky; top:0; z-index:30;
    background:rgba(0,0,0,.94);
    backdrop-filter:saturate(140%) blur(10px);
    -webkit-backdrop-filter:saturate(140%) blur(10px);
    border-bottom:1px solid var(--line-soft);
    padding:calc(var(--safe-top) + 10px) 0 0;
  }
  .infostrip{
    display:flex; justify-content:space-between; align-items:center;
    font-family:var(--mono); font-size:9px; font-weight:700;
    text-transform:uppercase; letter-spacing:0.18em; color:var(--text-2);
    padding-bottom:8px;
  }
  .infostrip .l,.infostrip .r{ display:flex; gap:10px; align-items:center; }
  .infostrip .sep{ color:var(--line-soft); }
  .infostrip .or{ color:var(--orange); }
  .infostrip .bl{ color:var(--blue); }

  .hrow{display:flex; align-items:center; gap:10px; padding:6px 0 10px;}
  .wordmark{
    font-family:var(--display); font-size:34px; line-height:0.85;
    text-transform:uppercase; letter-spacing:-0.035em;
    flex:1; min-width:0; user-select:none;
    display:flex; flex-direction:column;
  }
  .wordmark .a{ color:var(--text); }
  .wordmark .b{ color:var(--orange); margin-top:-2px; }
  .wordmark .dot{ display:inline-block; width:9px; height:9px; background:var(--blue); margin-left:4px; vertical-align:0; }

  .badge{ width:54px; height:54px; flex:none; display:block; }
  .badge .ring{ fill:var(--orange); stroke:var(--text); stroke-width:1.5; }
  .badge .core{ fill:var(--bg); }
  .badge .mark{ font-family:var(--display); font-size:18px; fill:var(--orange); text-anchor:middle; }
  .badge .orbit{
    font-family:var(--mono); font-size:8.5px; font-weight:700;
    fill:var(--on-color); letter-spacing:0.12em;
    transform-origin:50% 50%; animation:spin 14s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .sub{
    display:flex; align-items:center; gap:10px; padding:8px 0 10px;
    font-family:var(--mono); font-size:9.5px; font-weight:700;
    letter-spacing:0.14em; color:var(--text-2); text-transform:uppercase;
    border-top:1px solid var(--line);
  }
  .live{
    display:inline-flex; align-items:center; gap:6px; padding:4px 8px;
    background:var(--orange); color:var(--on-color);
    font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:0.16em;
  }
  .live .dot{ width:6px; height:6px; background:var(--on-color); animation:pulse 1.6s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:.45} 50%{opacity:1} }

  .iconbtn{
    width:42px; height:42px; border:1px solid var(--text); background:var(--bg);
    color:var(--text); display:inline-flex; align-items:center; justify-content:center;
    cursor:pointer; transition:background .12s ease, color .12s ease, transform .1s ease;
  }
  .iconbtn:hover{ background:var(--text); color:var(--bg); }
  .iconbtn:active{ transform:translate(1px,1px); }
  .iconbtn.active{ background:var(--orange); color:var(--on-color); border-color:var(--orange); }
  .iconbtn svg{ width:18px; height:18px; }

  .backbtn{
    display:inline-flex; align-items:center; gap:8px; background:none; border:none;
    color:var(--orange); font-family:var(--mono); font-size:11px; font-weight:700;
    letter-spacing:0.14em; text-transform:uppercase; cursor:pointer; padding:8px 4px 8px 0;
  }
  .backbtn svg{ width:14px; height:14px; }

  /* ═══════════ PLATFORM SELECTOR */
  .platwrap{ padding:10px 0 0; }
  .plats{
    display:flex; gap:4px; overflow-x:auto; -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .plats::-webkit-scrollbar{ display:none; }
  .plat{
    flex:1; min-width:72px; border:1px solid var(--line-soft); background:var(--bg);
    color:var(--text);
    font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:0.14em;
    text-transform:uppercase;
    padding:9px 6px; cursor:pointer; text-align:center;
    display:flex; flex-direction:column; gap:3px;
    transition:background .12s ease, color .12s ease, border-color .12s ease;
  }
  .plat:hover{ border-color:var(--text); }
  .plat.on{ background:var(--blue); color:#FFFFFF; border-color:var(--blue); }
  .plat .pm{
    font-family:var(--mono); font-size:8px; font-weight:500; opacity:.85; letter-spacing:0.12em;
    text-transform:uppercase;
  }

  /* ═══════════ SEGMENTED WINDOW */
  .segwrap{ padding:8px 0 4px; }
  .seg{ display:flex; gap:4px; }
  .seg button{
    flex:1; border:1px solid var(--line-soft); background:var(--bg);
    color:var(--text);
    font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:0.14em;
    text-transform:uppercase;
    padding:11px 6px; cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    transition:background .12s ease, color .12s ease, border-color .12s ease;
  }
  .seg button:hover{ border-color:var(--text); }
  .seg button.on{ background:var(--orange); color:var(--on-color); border-color:var(--orange); }
  .seg .lock{ font-size:10px; }

  /* ═══════════ SEARCH */
  .searchrow{
    margin-top:8px; display:flex; gap:8px;
  }
  .searchrow input{
    flex:1; background:var(--bg); border:1px solid var(--line-soft);
    color:var(--text); font-family:var(--mono); font-size:13px;
    padding:11px 12px; outline:none; letter-spacing:0.04em;
  }
  .searchrow input:focus{ border-color:var(--orange); }
  .searchrow input::placeholder{ color:var(--mute); font-family:var(--mono); }

  /* ═══════════ FILTERS */
  .filters{
    display:none; margin-top:10px;
    background:var(--bg-2); border:1px solid var(--line-soft); padding:18px;
  }
  .filters.open{ display:block; animation:filtersIn .22s ease-out; }
  @keyframes filtersIn{ from{ opacity:0; transform:translateY(-4px);} to{ opacity:1; transform:none;} }
  .filters h4{
    margin:0 0 10px; font-family:var(--mono); font-size:10px; font-weight:700;
    color:var(--text-2); text-transform:uppercase; letter-spacing:0.16em;
    padding-bottom:6px; border-bottom:1px solid var(--line);
  }
  .filters h4 + *{ margin-bottom:18px; }
  .chips{ display:flex; flex-wrap:wrap; gap:6px; }
  .chip{
    padding:6px 10px; border:1px solid var(--line-soft); background:transparent;
    color:var(--text); font-family:var(--mono); font-size:11px; font-weight:400;
    letter-spacing:0.04em; cursor:pointer; user-select:none;
    transition:background .12s ease, color .12s ease, border-color .12s ease;
  }
  .chip:hover{ border-color:var(--text); }
  .chip.on{ background:var(--orange); color:var(--on-color); border-color:var(--orange); font-weight:700; }
  .mmrow{ display:flex; gap:8px; }
  .mmrow input{
    flex:1; background:var(--bg); border:1px solid var(--line-soft);
    color:var(--text); font-family:var(--mono); font-size:12px;
    padding:9px 10px; outline:none; letter-spacing:0.04em;
  }
  .mmrow input:focus{ border-color:var(--orange); }
  .mmrow input::placeholder{ color:var(--mute); }
  .filters .foot{ display:flex; justify-content:space-between; margin-top:8px; padding-top:14px; border-top:1px solid var(--line); }
  .linkbtn{
    background:none; border:none; color:var(--text);
    font-family:var(--mono); font-size:11px; font-weight:700;
    letter-spacing:0.14em; text-transform:uppercase; cursor:pointer; padding:4px;
  }
  .linkbtn:hover{ color:var(--orange); }

  /* ═══════════ LIST + CARDS */
  .list{ padding:14px 0 24px; display:flex; flex-direction:column; gap:8px; }
  .list .card{
    --i: 0;
    opacity:0; transform:translateY(6px);
    animation:cardIn .35s cubic-bezier(.2,.7,.2,1) forwards;
    animation-delay: calc(var(--i) * 28ms);
  }
  @keyframes cardIn{ to{ opacity:1; transform:none; } }
  @media (prefers-reduced-motion: reduce){
    .list .card{ opacity:1; transform:none; animation:none; }
    .live .dot, .badge .orbit{ animation:none; }
  }

  .card{
    display:grid; grid-template-columns:82px 1fr; gap:10px;
    background:var(--bg-2); border:1px solid var(--line);
    padding:10px; cursor:pointer; position:relative;
    transition:background .12s ease, border-color .12s ease;
  }
  .card:hover{ border-color:var(--line-soft); background:var(--bg-3); }

  .rankblock{
    background:var(--blue); color:var(--on-color); padding:8px;
    display:flex; flex-direction:column;
    position:relative; overflow:hidden;
  }
  .card.tier-1 .rankblock{ background:var(--orange); }
  .card.tier-3 .rankblock{ background:var(--grey); color:var(--on-color); }
  .rankblock .cat{
    font-family:var(--mono); font-size:8px; font-weight:700;
    letter-spacing:0.16em; text-transform:uppercase; line-height:1; margin-bottom:4px;
  }
  .rankblock .rank{
    font-family:var(--display); font-size:34px; line-height:0.78;
    letter-spacing:-0.04em; color:var(--on-color);
    font-variant-numeric:tabular-nums;
  }
  .rankblock .delta{
    font-family:var(--mono); font-size:9.5px; font-weight:700;
    margin-top:4px; line-height:1; letter-spacing:0.04em;
  }
  .rankblock .cover{
    margin-top:auto; position:relative; width:64px; height:64px;
    background:var(--bg-3) center/cover no-repeat;
    border:1px solid var(--on-color); align-self:center;
  }
  .card.artist .rankblock .cover{ border-radius:50%; }
  .rankblock .cover .play{
    position:absolute; right:-1px; bottom:-1px; width:22px; height:22px;
    background:var(--bg); color:var(--text);
    border:1px solid var(--on-color);
    display:flex; align-items:center; justify-content:center;
  }
  .rankblock .cover .play svg{ width:10px; height:10px; }

  .cbody{ min-width:0; display:flex; flex-direction:column; }
  .ctop{
    display:flex; align-items:flex-start; gap:6px;
    font-family:var(--mono); font-size:8.5px; font-weight:700;
    letter-spacing:0.16em; text-transform:uppercase; color:var(--mute); margin-bottom:4px;
  }
  .ctop .coord{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ctop .or{ color:var(--orange); }
  .ctop .bl{ color:var(--blue); }

  .name{
    font-family:var(--display); font-size:18px;
    letter-spacing:-0.025em; line-height:0.98; text-transform:uppercase; color:var(--text);
    overflow:hidden; text-overflow:ellipsis; display:-webkit-box;
    -webkit-line-clamp:2; -webkit-box-orient:vertical; word-break:break-word;
  }
  .artist-name{
    font-family:var(--ui); font-weight:500; font-size:12.5px; color:var(--text-2);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    margin-top:4px; letter-spacing:0;
  }
  .heart{
    flex:none; cursor:pointer; color:var(--text);
    background:none; border:none; padding:2px 4px;
    transition:color .15s ease, transform .15s ease;
  }
  .heart:hover{ color:var(--orange); }
  .heart.on{ color:var(--orange); transform:scale(1.08); }
  .heart svg{ width:18px; height:18px; }

  .pillrow{
    display:flex; align-items:stretch; gap:6px; margin-top:8px; flex-wrap:wrap;
  }
  .metricpill{
    display:inline-flex; align-items:baseline; gap:5px;
    font-family:var(--mono); font-size:12.5px; font-weight:700; line-height:1;
    color:var(--on-color); background:var(--orange);
    padding:6px 8px; white-space:nowrap;
    font-variant-numeric:tabular-nums; letter-spacing:-0.005em;
  }
  .card.tier-2 .metricpill{ background:var(--blue); color:#FFFFFF; }
  .card.tier-3 .metricpill{ background:var(--grey); color:var(--on-color); }
  .metricpill .u{
    font-size:8.5px; font-weight:700; letter-spacing:0.12em;
    text-transform:uppercase; opacity:.85;
  }
  .hexlabel{
    display:inline-flex; align-items:center;
    font-family:var(--mono); font-size:9px; font-weight:700;
    color:var(--mute); letter-spacing:0.14em; text-transform:uppercase;
    padding:6px 0;
  }

  .meta{
    display:flex; gap:14px; margin-top:8px; font-family:var(--mono); font-size:9.5px;
    color:var(--text-2); flex-wrap:wrap; letter-spacing:0.1em; text-transform:uppercase;
    font-weight:500;
  }
  .meta b{ color:var(--text); font-weight:700; font-variant-numeric:tabular-nums; }
  .meta .sep{ color:var(--line-soft); }
  .meta .ic{ display:inline-block; margin-right:3px; opacity:.7; }

  .gchips{ display:flex; gap:5px; margin-top:8px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .gchips::-webkit-scrollbar{ display:none; }
  .gchip{
    font-family:var(--mono); font-size:9px; padding:3px 6px;
    background:var(--bg); border:1px solid var(--line-soft); white-space:nowrap;
    color:var(--text); text-transform:uppercase; letter-spacing:0.1em; font-weight:700;
  }
  .gchip::before{ content:"# "; color:var(--mute); font-weight:400; }

  .card.playing{
    background:var(--bg-3) !important;
    border-color:var(--orange) !important;
    box-shadow:inset 3px 0 0 var(--orange);
  }
  .card.playing .rankblock{ background:var(--orange) !important; color:var(--on-color); }
  .card.playing .name{ color:var(--orange); }
  .card.playing .rankblock .cover{ animation:coverpulse 2s ease-in-out infinite; }
  @keyframes coverpulse{
    0%{ box-shadow:0 0 0 0 rgba(242,59,26,0.5); }
    70%{ box-shadow:0 0 0 6px rgba(242,59,26,0); }
    100%{ box-shadow:0 0 0 0 rgba(242,59,26,0); }
  }
  @media (prefers-reduced-motion: reduce){ .card.playing .rankblock .cover{ animation:none; } }

  /* ═══════════ STATUS / EMPTY */
  .status{
    padding:64px 20px; text-align:center; color:var(--text-2);
    font-family:var(--mono); font-size:12px; letter-spacing:0.06em;
    border:1px dashed var(--line-soft); margin:18px 0;
  }
  .status .big{
    font-family:var(--display); font-size:30px;
    color:var(--text); margin-bottom:10px; letter-spacing:-0.025em;
    text-transform:uppercase; line-height:0.9;
  }
  .status .big em{ font-style:normal; color:var(--orange); }
  .primary{
    background:var(--orange); color:var(--on-color); border:1px solid var(--orange);
    font-family:var(--mono); font-weight:700; letter-spacing:0.16em; text-transform:uppercase;
    padding:13px 22px; font-size:11px; cursor:pointer;
    transition:background .12s ease, color .12s ease;
  }
  .primary:hover{ background:var(--text); border-color:var(--text); color:var(--bg); }

  .sechead{
    display:flex; align-items:center; gap:10px; margin:24px 0 12px;
    font-family:var(--mono); font-size:10.5px; color:var(--text);
    text-transform:uppercase; letter-spacing:0.16em; font-weight:700;
    padding-bottom:8px; border-bottom:1px solid var(--line-soft);
  }
  .sechead .cnt{ color:var(--orange); font-family:var(--mono); font-variant-numeric:tabular-nums; }
  .sechead .line{ flex:1; }
  .sechead .linkbtn{ font-size:11px; padding:0; }

  .plrow{
    display:flex; align-items:center; gap:14px;
    border:1px solid var(--line); background:var(--bg-2);
    padding:14px; cursor:pointer; margin-bottom:8px;
    transition:background .12s ease, border-color .12s ease;
  }
  .plrow:hover{ background:var(--bg-3); border-color:var(--line-soft); }
  .plicon{
    width:46px; height:46px; background:var(--blue);
    display:flex; align-items:center; justify-content:center; flex:none;
    position:relative; overflow:hidden;
  }
  .plicon::before{ content:""; position:absolute; left:6px; right:6px; top:50%; transform:translateY(-50%); height:2px; background:var(--on-color); }
  .plicon::after{ content:""; position:absolute; left:6px; right:6px; top:calc(50% + 8px); transform:translateY(-50%); height:2px; background:var(--on-color); opacity:.5; }
  .plname{ font-family:var(--display); font-size:18px; letter-spacing:-0.02em; text-transform:uppercase; line-height:1; }
  .plcount{ font-family:var(--mono); color:var(--text-2); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; margin-top:6px; }
  .chev{ margin-left:auto; font-family:var(--display); font-size:26px; color:var(--text); line-height:0.8; }

  /* ═══════════ PAYWALL */
  .lockbox{
    margin:22px 0; background:var(--bg-2);
    border:1px solid var(--line-soft); padding:0; text-align:left; position:relative;
  }
  .lockbox-head{
    background:var(--orange); color:var(--on-color); padding:20px 18px;
    font-family:var(--mono); font-size:10px; font-weight:700;
    letter-spacing:0.18em; text-transform:uppercase;
    display:flex; justify-content:space-between; align-items:center;
  }
  .lockbox-body{ padding:24px 22px; text-align:center; }
  .lockbox .ic{ width:44px; height:44px; margin:0 auto 14px; border:1px solid var(--text); background:transparent; display:flex; align-items:center; justify-content:center; }
  .lockbox .ic svg{ width:20px; height:20px; color:var(--orange); }
  .lockbox h3{ margin:0 0 8px; font-family:var(--display); font-size:28px; text-transform:uppercase; letter-spacing:-0.025em; line-height:0.95; }
  .lockbox p{ color:var(--text-2); font-family:var(--ui); font-size:14px; margin:0 auto 18px; max-width:340px; line-height:1.5; }
  .lockbox .price{ font-family:var(--display); font-size:54px; color:var(--orange); letter-spacing:-0.04em; line-height:0.9; }
  .lockbox .price small{ font-family:var(--mono); font-size:13px; color:var(--text-2); font-weight:700; margin-left:4px; letter-spacing:0.08em; text-transform:uppercase; }
  .lockbox ul{ list-style:none; padding:0; margin:18px auto; max-width:300px; text-align:left; font-family:var(--mono); font-size:12px; letter-spacing:0.02em; }
  .lockbox li{ padding:7px 0; display:flex; gap:10px; align-items:flex-start; border-bottom:1px solid var(--line); }
  .lockbox li:last-child{ border-bottom:none; }
  .lockbox li::before{ content:"▸"; color:var(--orange); font-weight:700; flex:none; }
  .lockbox .primary{ width:100%; padding:14px; font-size:12px; }
  .demo{ display:block; margin-top:14px; color:var(--text-2); font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; background:none; border:none; cursor:pointer; width:100%; text-decoration:underline; text-underline-offset:3px; }

  /* ═══════════ TAB BAR */
  .tabbar{

  .mpseek{

  .mpcontrols{

  @media (prefers-reduced-motion: reduce){ .mpcover{ animation:none; } .miniplayer.on{ animation:none; } }

  /* ═══════════ DETAIL SHEET */
  .sheet{

<script>
const FEED_URL="./feed.json";
const LS={likes:"rr_likes_v1",playlists:"rr_playlists_v1",feed:"rr_feed_v3",premium:"rr_premium"};
const state={feed:null,view:"radar",platform:null,window:null,currentPlaylist:null,
  filter:{q:"",genres:new Set(),labels:new Set(),fresh:false,min:null,max:null},
  playingId:null,openId:null,
  artistsFeed:null,artistPlatform:null,artistWindow:null,artistQ:"",
  soundsFeed:null,soundWindow:null,soundQ:"",
  likes:loadJSON(LS.likes,{}),playlists:loadJSON(LS.playlists,[])};
const audio=document.getElementById('audio');

function loadJSON(k,def){try{return JSON.parse(localStorage.getItem(k))??def;}catch(e){return def;}}
function saveLikes(){localStorage.setItem(LS.likes,JSON.stringify(state.likes));}
function savePlaylists(){localStorage.setItem(LS.playlists,JSON.stringify(state.playlists));}
function isPremium(){return localStorage.getItem(LS.premium)==="1";}
function setPremium(v){v?localStorage.setItem(LS.premium,"1"):localStorage.removeItem(LS.premium);}

const fmt=n=>{if(n==null||n<=0)return "—";if(n>=1e9)return (n/1e9).toFixed(1)+"B";if(n>=1e6)return (n/1e6).toFixed(1)+"M";if(n>=1e3)return (n/1e3).toFixed(1)+"K";return ""+Math.round(n);};
const esc=s=>(s==null?"":(""+s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const mmss=s=>{if(!isFinite(s)||s<0)s=0;const m=Math.floor(s/60),x=Math.floor(s%60);return m+":"+(x<10?"0":"")+x;};
const newId=()=>"pl_"+Math.random().toString(36).slice(2,9)+state.playlists.length;
const pad2=n=>(n<10?"0":"")+n;
const pad3=n=>(n<10?"00":(n<100?"0":""))+n;
const ic=(id,cls)=>`<svg class="${cls||''}"><use href="#i-${id}"/></svg>`;

/* deterministic fake coord from id */
function coordOf(t){
  const s=(t.id||t.name+t.artist||"").toLowerCase();
  let h=0; for(const c of s) h=(h*31+c.charCodeAt(0))&0xffff;
  const lat=30+(h%50), lng=10+((h>>4)%170);
  return `E${pad2(lat)}°${pad2((h>>8)%60)}'-${pad2(lng%180)}°${pad2((h>>12)%60)}'`;
}

/* feed accessors */
function platforms(){return state.feed?.platforms||[];}
function windowsMeta(){return state.feed?.windows||[];}
function windowMeta(k){return windowsMeta().find(w=>w.key===k);}
function platformMeta(k){return platforms().find(p=>p.key===k);}
function freeWindow(){return state.feed?.free_window||"month";}
function price(){return state.feed?.premium_price_eur||9.99;}
function isLocked(k){const w=windowMeta(k);return w&&w.tier==="premium"&&!isPremium();}
function chartIds(){return (state.feed?.charts?.[state.platform]?.[state.window])||[];}
function trackById(id){
  if(state.feed?.tracks&&state.feed.tracks[id])return state.feed.tracks[id];
  if(state.soundsFeed?.sounds&&state.soundsFeed.sounds[id])return state.soundsFeed.sounds[id];
  if(state.likes[id])return state.likes[id];
  for(const p of state.playlists){const t=p.tracks.find(x=>x.id===id);if(t)return t;}
  return null;
}

function metricValue(t,platform,window){
  if(window==="24h")return t[platform+"_24h_pct"]||0;
  if(window==="7d")return t[platform+"_7d"]||0;
  return t[platform+"_total"]||0;
}
function headline(t){
  const p=state.platform,w=state.window,pm=platformMeta(p);
  if(w==="24h")return '+'+(t[p+"_24h_pct"]||0).toFixed(0)+'%<span class="u">24H</span>';
  const lbl=pm?pm.metric_label.toUpperCase():"";
  return fmt(metricValue(t,p,w))+'<span class="u">'+lbl+(w==="7d"?' 7G':'')+'</span>';
}

const isLiked=id=>!!state.likes[id];
function toggleLike(t){const id=t.id;if(state.likes[id])delete state.likes[id];else state.likes[id]=t;saveLikes();rerender();}
function createPlaylist(name,first){const p={id:newId(),name:name||"Nuova playlist",createdAt:new Date().toISOString(),tracks:[]};if(first)p.tracks.push(first);state.playlists.unshift(p);savePlaylists();return p;}
function renamePlaylist(id){const p=state.playlists.find(x=>x.id===id);if(!p)return;const n=prompt("Nome playlist:",p.name);if(n&&n.trim()){p.name=n.trim();savePlaylists();rerender();}}
function deletePlaylist(id){const p=state.playlists.find(x=>x.id===id);if(!p)return;if(!confirm('Eliminare "'+p.name+'"?'))return;state.playlists=state.playlists.filter(x=>x.id!==id);savePlaylists();state.view==="playlist"?goView("library"):rerender();}
const inPlaylist=(pl,id)=>pl.tracks.some(t=>t.id===id);
function togglePlaylistTrack(plId,t){const p=state.playlists.find(x=>x.id===plId);if(!p)return;if(inPlaylist(p,t.id))p.tracks=p.tracks.filter(x=>x.id!==t.id);else p.tracks.push(t);savePlaylists();}

function parseDate(s){if(!s)return null;const m=/^(\d{4})(?:-(\d{2}))?(?:-(\d{2}))?/.exec(s);return m?new Date(Date.UTC(+m[1],(m[2]?+m[2]-1:0),(m[3]?+m[3]:1))):null;}
function matches(t){const f=state.filter;
  if(f.q){const q=f.q.toLowerCase();if(!((t.name||"").toLowerCase().includes(q)||(t.artist||"").toLowerCase().includes(q)||(t.label||"").toLowerCase().includes(q)))return false;}
  if(f.labels.size&&!f.labels.has(t.label_category))return false;
  if(f.genres.size){const g=(t.genres||[]).map(x=>x.toLowerCase());if(![...f.genres].some(sel=>g.some(x=>x.includes(sel.toLowerCase()))))return false;}
  if(f.fresh){const d=parseDate(t.release_date);if(!d||(Date.now()-d.getTime())/86400000>30)return false;}
  if(f.min!=null||f.max!=null){const v=metricValue(t,state.platform,state.window);if(f.min!=null&&v<f.min)return false;if(f.max!=null&&v>f.max)return false;}
  return true;}

function deltaText(d){
  if(!d)return "";
  if(d==="NEW")return "NEW";
  if(/^↑/.test(d))return "▲"+d.replace(/^↑/,'');
  if(/^↓/.test(d))return "▼"+d.replace(/^↓/,'');
  if(d==="=")return "—";
  return "";
}

function metaBits(t){
  const bits=[];
  if((t.spotify_24h||0)>0||state.platform==="spotify")bits.push(`SPT <b>${fmt(t.spotify_24h)}</b>`);
  if((t.tiktok_24h||0)>0||state.platform==="tiktok")bits.push(`TT <b>${fmt(t.tiktok_24h)}</b>`);
  if((t.youtube_24h||0)>0||state.platform==="youtube")bits.push(`YT <b>${fmt(t.youtube_24h)}</b>`);
  if((t.shazam_total||0)>0||state.platform==="shazam")bits.push(`SHZ <b>${fmt(t.shazam_total)}</b>`);
  return bits.slice(0,3).map((b,i)=>i>0?`<span class="sep">/</span><span>${b}</span>`:`<span>${b}</span>`).join('');
}

function cardHTML(t,opt,index){
  opt=opt||{}; const id=t.id;
  const cover=t.cover_url?`style="background-image:url('${esc(t.cover_url)}')"`:"";
  const playing=state.playingId===id;
  const play=t.preview_url?`<div class="play" data-play="${esc(id)}">${ic(playing?"pause":"play")}</div>`:"";
  const gchips=(t.genres||[]).slice(0,3).map(g=>`<span class="gchip">${esc(g.replace(/\s+/g,'-'))}</span>`).join('');
  const rank=opt.rank||0;
  const rankNum=rank?pad2(rank):"—";
  const catNum=rank?"RR.S04.E"+pad3(rank):"RR.S04.E—";
  const tier=!rank?"":(rank<=3?"tier-1":(rank<=10?"tier-2":"tier-3"));
  const delta=deltaText(t.delta);
  const coord=coordOf(t);
  const rankBlock=opt.hideRank
    ? `<div class="rankblock" style="background:var(--bg-3);"><div class="cover" ${cover}>${play}</div></div>`
    : `<div class="rankblock">
        <div class="cat">E${pad3(rank)}</div>
        <div class="rank">${rankNum}</div>
        ${delta?`<div class="delta">${esc(delta)}</div>`:""}
        <div class="cover" ${cover}>${play}</div>
      </div>`;
  const right=opt.removeFrom
    ? `<button class="heart" data-rm="${esc(id)}" title="Rimuovi">${ic("trash")}</button>`
    : `<button class="heart ${isLiked(id)?'on':''}" data-like="${esc(id)}">${ic(isLiked(id)?'heart-fill':'heart')}</button>`;
  const pill=opt.library
    ? (t.spotify_24h_pct!=null?`<span class="metricpill">+${(t.spotify_24h_pct||0).toFixed(0)}%<span class="u">24H</span></span>`:"")
    : `<span class="metricpill">${headline(t)}</span>`;
  const lbl=t.label_category?`<span class="hexlabel">${esc(t.label_category).toUpperCase()}</span>`:`<span class="hexlabel">#F23B1A</span>`;
  return `<div class="card ${tier} ${playing?'playing':''}" data-open="${esc(id)}" style="--i:${index||0}">
    ${rankBlock}
    <div class="cbody">
      <div class="ctop">
        <span class="coord"><span class="or">●</span> ${esc(catNum)} <span class="sep">/</span> <span class="bl">${esc(coord)}</span></span>
        ${right}
      </div>
      <div class="name">${esc(t.name)}</div>
      <div class="artist-name">${esc(t.artist)}</div>
      <div class="pillrow">${pill}${lbl}</div>
      <div class="meta">${metaBits(t)}</div>
      ${gchips?`<div class="gchips">${gchips}</div>`:""}
    </div>
  </div>`;
}

function bindCards(scope,opt){opt=opt||{};
  scope.querySelectorAll('[data-open]').forEach(el=>el.addEventListener('click',e=>{if(e.target.closest('[data-play]')||e.target.closest('[data-like]')||e.target.closest('[data-rm]'))return;openDetail(el.dataset.open);}));
  scope.querySelectorAll('[data-play]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();togglePlay(el.dataset.play);}));
  scope.querySelectorAll('[data-like]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();const t=trackById(el.dataset.like);if(t)toggleLike(t);}));
  scope.querySelectorAll('[data-rm]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();const id=el.dataset.rm;
    if(opt.removeFrom==="likes"){delete state.likes[id];saveLikes();rerender();}
    else if(opt.removeFrom){const p=state.playlists.find(x=>x.id===opt.removeFrom);if(p){p.tracks=p.tracks.filter(x=>x.id!==id);savePlaylists();rerender();}}}));
}

function rerender(){render();if(document.getElementById('sheet').classList.contains('open')&&state.openId)refreshDetailStateOnly();}
function render(){
  document.body.dataset.view=state.view;
  syncHeader();syncTabs();renderPlat();renderSeg();renderSearch();updateEditionDate();syncMiniplayer();
  const c=document.getElementById('content');
  if(state.view==="radar")return renderRadar(c);
  if(state.view==="artists")return renderArtists(c);
  if(state.view==="sounds")return renderSounds(c);
  if(state.view==="library")return renderLibrary(c);
  if(state.view==="playlist")return renderPlaylist(c);
}

function syncMiniplayer(){
  const mp=document.getElementById('miniplayer');
  if(!state.playingId){ mp.classList.remove('on'); document.body.removeAttribute('data-playing'); return; }
  const t=trackById(state.playingId);
  if(!t){ mp.classList.remove('on'); document.body.removeAttribute('data-playing'); return; }
  document.body.dataset.playing="1"; mp.classList.add('on');
  document.getElementById('mpCover').style.backgroundImage=t.cover_url?`url('${t.cover_url}')`:'none';
  document.getElementById('mpName').textContent=t.name;
  document.getElementById('mpArtist').textContent=t.artist;
  document.getElementById('mpBtn').innerHTML=ic(audio.paused?'play':'pause');
  updateMiniplayerScrubber();
}
function updateMiniplayerScrubber(){
  if(!state.playingId)return;
  const seek=document.getElementById('mpSeek'),cur=document.getElementById('mpCur'),dur=document.getElementById('mpDur');
  if(!seek)return;
  if(audio.duration){seek.value=Math.round(audio.currentTime/audio.duration*1000);if(cur)cur.textContent=mmss(audio.currentTime);if(dur)dur.textContent=mmss(audio.duration);}
}

function renderRadar(c){
  if(!state.feed){c.innerHTML='<div class="status"><div class="big">Sintonizzo<em>…</em></div>Carico le frequenze.</div>';return;}
  if(isLocked(state.window)){c.innerHTML=paywallHTML();bindPaywall(c);return;}
  const ids=chartIds();
  const rows=ids.map(id=>state.feed.tracks[id]).filter(Boolean);
  const filtered=rows.filter(matches);
  if(!filtered.length){c.innerHTML=`<div class="status"><div class="big">Nessun<em> segnale</em></div>Nessun brano corrisponde ai filtri.<br><br><button class="primary" id="rs2">↻ Reset filtri</button></div>`;document.getElementById('rs2').onclick=resetFilters;return;}
  c.innerHTML='<div class="list">'+filtered.map((t,i)=>cardHTML(t,{rank:ids.indexOf(t.id)+1},i)).join('')+'</div>';
  bindCards(c);
}

function renderLibrary(c){const liked=Object.values(state.likes);let html='';

function renderPlaylist(c){const p=state.playlists.find(x=>x.id===state.currentPlaylist);if(!p){goView("library");return;}
  c.innerHTML=p.tracks.length?'<div class="list">'+p.tracks.map((t,i)=>cardHTML(t,{hideRank:true,library:true,removeFrom:p.id},i)).join('')+'</div>':'<div class="status" style="padding:32px 0;">Playlist vuota.<br>Apri un brano e tocca "Aggiungi a playlist".</div>';
  bindCards(c,{removeFrom:p.id});}

function renderPlat(){const w=document.getElementById('platWrap');
  if(!(state.view==="radar"||state.view==="artists")||!state.feed){w.innerHTML="";return;}
  if(state.view==="artists"){
    if(!state.artistsFeed){w.innerHTML="";return;}
    w.innerHTML='<div class="plats">'+aPlatforms().map(p=>`<button class="plat ${p.key===state.artistPlatform?'on':''}" data-aplat="${p.key}">${esc(p.label)}<span class="pm">${esc(p.metric_label).toUpperCase()}</span></button>`).join('')+'</div>';
    w.querySelectorAll('[data-aplat]').forEach(el=>el.onclick=()=>{state.artistPlatform=el.dataset.aplat;window.scrollTo(0,0);render();});
    return;
  }
  w.innerHTML='<div class="plats">'+platforms().map(p=>`<button class="plat ${p.key===state.platform?'on':''}" data-plat="${p.key}">${esc(p.label)}<span class="pm">${esc(p.metric_label).toUpperCase()}</span></button>`).join('')+'</div>';
  w.querySelectorAll('[data-plat]').forEach(el=>el.onclick=()=>{state.platform=el.dataset.plat;window.scrollTo(0,0);buildFilterChips();render();});
}
function renderSeg(){const w=document.getElementById('segWrap');
  if(state.view==="sounds"){
    if(!state.soundsFeed){w.innerHTML="";return;}
    w.innerHTML='<div class="seg">'+sWindows().map(m=>`<button class="${m.key===state.soundWindow?'on':''}" data-swin="${m.key}">${esc(m.label).toUpperCase()}${sLocked(m.key)?' <span class="lock">⊠</span>':''}</button>`).join('')+'</div>';
    w.querySelectorAll('[data-swin]').forEach(el=>el.onclick=()=>{state.soundWindow=el.dataset.swin;window.scrollTo(0,0);render();});
    return;
  }
  if(!(state.view==="radar"||state.view==="artists")||!state.feed){w.innerHTML="";return;}
  if(state.view==="artists"){
    if(!state.artistsFeed){w.innerHTML="";return;}
    w.innerHTML='<div class="seg">'+aWindows().map(m=>`<button class="${m.key===state.artistWindow?'on':''}" data-awin="${m.key}">${esc(m.label).toUpperCase()}${aLocked(m.key)?' <span class="lock">⊠</span>':''}</button>`).join('')+'</div>';
    w.querySelectorAll('[data-awin]').forEach(el=>el.onclick=()=>{state.artistWindow=el.dataset.awin;window.scrollTo(0,0);render();});
    return;
  }
  w.innerHTML='<div class="seg">'+windowsMeta().map(m=>`<button class="${m.key===state.window?'on':''}" data-win="${m.key}">${esc(m.label).toUpperCase()}${isLocked(m.key)?' <span class="lock">⊠</span>':''}</button>`).join('')+'</div>';
  w.querySelectorAll('[data-win]').forEach(el=>el.onclick=()=>{state.window=el.dataset.win;window.scrollTo(0,0);buildFilterChips();render();});
}
function renderSearch(){
  const w=document.getElementById('searchWrap');
  w.style.display=(state.view==="radar"||state.view==="artists"||state.view==="sounds")&&(state.feed||state.soundsFeed)?"flex":"none";
  if(state.view==="sounds"){
    const inp=document.getElementById('searchInput');
    inp.placeholder="Cerca sound, brano o artista…";
    inp.value=state.soundQ;
  } else if(state.view==="artists"){
    const inp=document.getElementById('searchInput');
    inp.placeholder="Cerca artista…";
    inp.value=state.artistQ;
  } else {
    const inp=document.getElementById('searchInput');
    inp.placeholder="Cerca brano, artista, label…";
    inp.value=state.filter.q;
  }
}

  const yt="https://www.youtube.com/results?search_query="+encodeURIComponent(t.name+" "+t.artist);

    </div>

      <div class="pl">
        <div class="dlabel">SAMPLE / 14C AREA</div>
        <div class="dcover" ${cover}></div>
        <div class="dlabel">${t.label?esc(t.label).toUpperCase():"INDIE"}</div>
      </div>

        <div class="dlabel">24H GROWTH / #F23B1A</div>

      <div class="mcard"><div class="k">TikTok video</div><div class="v">${fmt(t.tiktok_total)} <small>+${(t.tiktok_24h_pct||0).toFixed(0)}%</small></div></div>
      <div class="mcard"><div class="k">YouTube views</div><div class="v">${fmt(t.youtube_total)}</div></div>

    <div class="plpick"><h4>Aggiungi a playlist</h4><div class="chips">${plChips}<span class="chip" id="newPlChip">+ Nuova</span></div></div>

function refreshDetailStateOnly(){const pBtn=document.getElementById('pBtn');if(pBtn)pBtn.innerHTML=ic(state.playingId===state.openId?"pause":"play");updateScrubber();}
function updateScrubber(){const seek=document.getElementById('seek'),cur=document.getElementById('tCur'),dur=document.getElementById('tDur');if(!seek)return;
  if(state.playingId===state.openId&&audio.duration){seek.value=Math.round(audio.currentTime/audio.duration*1000);if(cur)cur.textContent=mmss(audio.currentTime);if(dur)dur.textContent=mmss(audio.duration);}
  else if(state.playingId!==state.openId){seek.value=0;if(cur)cur.textContent="0:00";}}
function closeSheet(){const inner=document.getElementById('sheetinner');inner.style.transform='';inner.style.transition='';document.getElementById('sheet').style.background='';document.getElementById('sheet').classList.remove('open');state.openId=null;}
document.getElementById('sheet').addEventListener('click',e=>{if(e.target.id==='sheet')closeSheet();});
(function(){const inner=document.getElementById('sheetinner'),sheet=document.getElementById('sheet');let sy=0,sScroll=0,mode=null;
  inner.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;sScroll=inner.scrollTop;mode=null;inner.style.transition='none';},{passive:true});
  inner.addEventListener('touchmove',e=>{const dy=e.touches[0].clientY-sy;if(mode===null&&Math.abs(dy)>6)mode=(sScroll<=0&&dy>0)?'drag':'scroll';if(mode==='drag'){e.preventDefault();const d=Math.max(0,dy);inner.style.transform='translateY('+d+'px)';sheet.style.background='rgba(0,0,0,'+Math.max(0,.55-d/900)+')';}},{passive:false});
  function end(e){if(mode==='drag'){const dy=(e.changedTouches?e.changedTouches[0].clientY:sy)-sy;inner.style.transition='transform .25s ease';sheet.style.background='';if(dy>110)closeSheet();else inner.style.transform='';}mode=null;}
  inner.addEventListener('touchend',end);inner.addEventListener('touchcancel',end);})();

function togglePlay(id){const t=trackById(id);const url=t&&(t.preview_url||t.play_url);if(!url)return;if(state.playingId===id){audio.pause();state.playingId=null;rerender();return;}audio.src=url;audio.play().catch(()=>{});state.playingId=id;rerender();}
audio.addEventListener('ended',()=>{state.playingId=null;rerender();});
audio.addEventListener('timeupdate',()=>{updateScrubber();updateMiniplayerScrubber();});
audio.addEventListener('loadedmetadata',()=>{updateScrubber();updateMiniplayerScrubber();});
audio.addEventListener('play',()=>{const b=document.getElementById('mpBtn');if(b)b.innerHTML=ic('pause');});
audio.addEventListener('pause',()=>{const b=document.getElementById('mpBtn');if(b)b.innerHTML=ic('play');});

document.getElementById('mpSeek').addEventListener('input',e=>{if(audio.duration)audio.currentTime=e.target.value/1000*audio.duration;});
document.getElementById('mpBtn').addEventListener('click',()=>{if(state.playingId)togglePlay(state.playingId);});
document.querySelectorAll('[data-mpopen]').forEach(el=>el.addEventListener('click',()=>{if(state.playingId)openDetail(state.playingId);}));

function updateEditionDate(){
  const el=document.getElementById('edDate');if(!el)return;
  if(!state.feed){el.textContent="—.—.—";return;}
  const d=new Date(state.feed.generated_at);
  el.textContent=`${d.getFullYear()}.${pad2(d.getMonth()+1)}.${pad2(d.getDate())}`;
}

function syncHeader(){const h=document.getElementById('headerRow'),sub=document.getElementById('sub'),fEl=document.getElementById('filters');
  if(state.view==="radar"){
    h.innerHTML=`
      <div class="wordmark"><span class="a">REMIX</span><span class="b">RADAR<span class="dot"></span></span></div>
      <svg class="badge" viewBox="0 0 100 100" aria-hidden="true">
        <defs><path id="orbitp" d="M 50 50 m -38 0 a 38 38 0 1 1 76 0 a 38 38 0 1 1 -76 0"/></defs>
        <circle class="ring" cx="50" cy="50" r="42"/><circle class="core" cx="50" cy="50" r="22"/>
        <text class="orbit"><textPath href="#orbitp">• REMIX RADAR • LAB • DAILY </textPath></text>
        <text class="mark" x="50" y="56">RR</text>
      </svg>
      <button class="iconbtn" id="refreshBtn" title="Aggiorna" aria-label="Aggiorna">${ic("refresh")}</button>
      <button class="iconbtn ${filterActive()?'active':''}" id="filterBtn" title="Filtri" aria-label="Filtri">${ic("filter")}</button>`;
    sub.style.display="flex";
    const pm=platformMeta(state.platform),wm=windowMeta(state.window);
    sub.innerHTML=state.feed?`<span class="live"><span class="dot"></span>ON AIR</span><span>${esc(pm?pm.label.toUpperCase():"")}</span><span>/</span><span>${esc(wm?wm.label.toUpperCase():"")}</span><span>/</span><span>SYNC ${relTime(state.feed.generated_at)}</span>`:`<span>SINTONIZZO…</span>`;
    document.getElementById('refreshBtn').onclick=()=>load(true);document.getElementById('filterBtn').onclick=()=>fEl.classList.toggle('open');
  } else if(state.view==="artists"){
    h.innerHTML=`<div class="wordmark"><span class="a">ARTISTI</span><span class="b">CHART<span class="dot"></span></span></div>`;
    sub.style.display="flex";
    const pm=aPlatformMeta(state.artistPlatform),wm=aWindowMeta(state.artistWindow);
    sub.innerHTML=state.artistsFeed?`<span class="live"><span class="dot"></span>ON AIR</span><span>${esc(pm?pm.label.toUpperCase():"")}</span><span>/</span><span>${esc(wm?wm.label.toUpperCase():"")}</span>`:`<span>SINTONIZZO…</span>`;
    fEl.classList.remove('open');
  } else if(state.view==="sounds"){
    h.innerHTML=`<div class="wordmark"><span class="a">SOUNDS</span><span class="b">TIKTOK<span class="dot"></span></span></div>`;
    sub.style.display="flex";
    const wm=sWindowMeta(state.soundWindow);
    sub.innerHTML=state.soundsFeed?`<span class="live"><span class="dot"></span>ON AIR</span><span>TIKTOK</span><span>/</span><span>${esc(wm?wm.label.toUpperCase():"")}</span><span>/</span><span>SOUNDS PIÙ USATI</span>`:`<span>SINTONIZZO…</span>`;
    fEl.classList.remove('open');
  } else if(state.view==="library"){
    h.innerHTML=`<div class="wordmark"><span class="a">LIBRERIA</span><span class="b">PERSONALE<span class="dot"></span></span></div>`;
    sub.style.display="none";fEl.classList.remove('open');
  } else if(state.view==="playlist"){
    const p=state.playlists.find(x=>x.id===state.currentPlaylist);
    h.innerHTML=`<button class="backbtn" id="backBtn">${ic("back")} Libreria</button><div style="flex:1"></div><button class="iconbtn" id="renBtn" title="Rinomina" aria-label="Rinomina">${ic("edit")}</button><button class="iconbtn" id="delBtn" title="Elimina" aria-label="Elimina">${ic("trash")}</button>`;
    sub.style.display="flex";sub.innerHTML=p?`<span>${esc(p.name).toUpperCase()}</span><span>/</span><span>${pad2(p.tracks.length)} BRAN${p.tracks.length===1?'O':'I'}</span>`:"";
    fEl.classList.remove('open');
    document.getElementById('backBtn').onclick=()=>goView("library");document.getElementById('renBtn').onclick=()=>renamePlaylist(state.currentPlaylist);document.getElementById('delBtn').onclick=()=>deletePlaylist(state.currentPlaylist);
  }
}
function syncTabs(){document.getElementById('tabRadar').classList.toggle('on',state.view==="radar");document.getElementById('tabArtists').classList.toggle('on',state.view==="artists");document.getElementById('tabSounds').classList.toggle('on',state.view==="sounds");document.getElementById('tabLib').classList.toggle('on',state.view==="library"||state.view==="playlist");}
function goView(v){state.view=v;closeSheet();window.scrollTo(0,0);if(v==="artists"&&!state.artistsFeed)loadArtists();if(v==="sounds"&&!state.soundsFeed)loadSounds();render();}
document.getElementById('tabRadar').onclick=()=>goView("radar");document.getElementById('tabArtists').onclick=()=>goView("artists");document.getElementById('tabSounds').onclick=()=>goView("sounds");document.getElementById('tabLib').onclick=()=>goView("library");

/* ---- Artists tab ---- */
function aPlatforms(){return state.artistsFeed?.platforms||[];}
function aWindows(){return state.artistsFeed?.windows||[];}
function aWindowMeta(k){return aWindows().find(w=>w.key===k);}
function aPlatformMeta(k){return aPlatforms().find(p=>p.key===k);}
function aLocked(k){const w=aWindowMeta(k);return w&&w.tier==="premium"&&!isPremium();}
function aMetricValue(a,p,w){if(w==="24h")return a[p+"_24h_pct"]||0;if(w==="7d")return a[p+"_7d"]||0;return a[p+"_total"]||0;}
function aHeadline(a){const p=state.artistPlatform,w=state.artistWindow,pm=aPlatformMeta(p);
  if(w==="24h")return '+'+(a[p+"_24h_pct"]||0).toFixed(0)+'%<span class="u">24H</span>';
  return fmt(aMetricValue(a,p,w))+'<span class="u">'+(pm?pm.metric_label.toUpperCase():"")+(w==="7d"?' 7G':'')+'</span>';}
async function loadArtists(){
  try{const r=await fetch("./artists.json?t="+Date.now(),{cache:"no-store"});if(!r.ok)throw 0;state.artistsFeed=await r.json();
    if(!state.artistPlatform)state.artistPlatform=(aPlatforms()[1]||aPlatforms()[0])?.key||"spotify";
    if(!state.artistWindow)state.artistWindow=isPremium()?(aWindows()[0]?.key||"24h"):(state.artistsFeed.free_window||"month");
    if(state.view==="artists")render();
  }catch(e){if(state.view==="artists")document.getElementById('content').innerHTML='<div class="status"><div class="big">Errore</div>Impossibile caricare gli artisti.</div>';}
}
function renderArtists(c){
  if(!state.artistsFeed){c.innerHTML='<div class="status"><div class="big">Sintonizzo<em>…</em></div>Carico gli artisti.</div>';return;}
  if(aLocked(state.artistWindow)){
    const wm=aWindowMeta(state.artistWindow);
    c.innerHTML=`<div class="lockbox">
      <div class="lockbox-head"><span>CAT. PREMIUM / ${esc(wm?wm.label:"").toUpperCase()}</span><span>ARTISTS</span></div>
      <div class="lockbox-body">
        <div class="ic">${ic("lock")}</div>
        <h3>${esc(wm?wm.label:"")} — Premium</h3>
        <p>Classifiche artisti <b>24h</b> e <b>7 giorni</b> sono Premium.</p>
        <button class="demo" id="aDemo">Sblocca in modalità demo</button>
      </div>
    </div>`;
    document.getElementById('aDemo').onclick=()=>{setPremium(true);render();};
    return;
  }
  const ids=(state.artistsFeed.charts?.[state.artistPlatform]?.[state.artistWindow])||[];
  let rows=ids.map(id=>state.artistsFeed.artists[id]).filter(Boolean);
  if(state.artistQ){const q=state.artistQ.toLowerCase();rows=rows.filter(a=>(a.name||"").toLowerCase().includes(q));}
  if(!rows.length){c.innerHTML=`<div class="status"><div class="big">Nessun<em> match</em></div>La ricerca non ha trovato artisti.</div>`;return;}
  c.innerHTML='<div class="list">'+rows.map((a,i)=>artistCardHTML(a,ids.indexOf(a.id)+1,i)).join('')+'</div>';
  c.querySelectorAll('[data-artist]').forEach(el=>el.onclick=()=>{const a=state.artistsFeed.artists[el.dataset.artist];if(a&&a.spotify_id)window.open("https://open.spotify.com/artist/"+a.spotify_id,"_blank");});
}
function artistCardHTML(a,rank,index){
  const img=a.image_url?`style="background-image:url('${esc(a.image_url)}')"`:"";
  const tier=!rank?"":(rank<=3?"tier-1":(rank<=10?"tier-2":"tier-3"));
  const rankNum=rank?pad2(rank):"—";
  const coord=coordOf({id:a.id,name:a.name});
  const meta=[];
  if((a.spotify_total||0)>0)meta.push(`SPT <b>${fmt(a.spotify_total)}</b>`);
  if((a.tiktok_total||0)>0)meta.push(`TT <b>${fmt(a.tiktok_total)}</b>`);
  if((a.youtube_total||0)>0)meta.push(`YT <b>${fmt(a.youtube_total)}</b>`);
  const metaHTML=meta.slice(0,3).map((b,i)=>i>0?`<span class="sep">/</span><span>${b}</span>`:`<span>${b}</span>`).join('');
  return `<div class="card artist ${tier}" data-artist="${esc(a.id)}" style="--i:${index||0}">
    <div class="rankblock">
      <div class="cat">A${pad3(rank)}</div>
      <div class="rank">${rankNum}</div>
      <div class="cover" ${img}></div>
    </div>
    <div class="cbody">
      <div class="ctop"><span class="coord"><span class="or">●</span> RR.A04.A${pad3(rank)} <span class="sep">/</span> <span class="bl">${esc(coord)}</span></span></div>
      <div class="name">${esc(a.name)}</div>
      <div class="pillrow"><span class="metricpill">${aHeadline(a)}</span><span class="hexlabel">#F23B1A</span></div>
      <div class="meta">${metaHTML}</div>
    </div>
  </div>`;
}

/* ---- Sounds tab (TikTok) ---- */
function sWindows(){return state.soundsFeed?.windows||[];}
function sWindowMeta(k){return sWindows().find(w=>w.key===k);}
function sLocked(k){const w=sWindowMeta(k);return w&&w.tier==="premium"&&!isPremium();}
function sField(w){return w==="24h"?"video_24h":w==="7d"?"video_7d":"video_total";}
function sHeadline(s){const w=state.soundWindow;return fmt(s[sField(w)]||0)+'<span class="u">VIDEO'+(w==="7d"?' 7G':w==="24h"?' 24H':'')+'</span>';}
async function loadSounds(){
  try{const r=await fetch("./sounds.json?t="+Date.now(),{cache:"no-store"});if(!r.ok)throw 0;state.soundsFeed=await r.json();
    Object.values(state.soundsFeed.sounds||{}).forEach(s=>{if(!s.cover_url)s.cover_url=s.image_url;});
    if(!state.soundWindow)state.soundWindow=isPremium()?(sWindows()[0]?.key||"24h"):(state.soundsFeed.free_window||"month");
    if(state.view==="sounds")render();
  }catch(e){if(state.view==="sounds")document.getElementById('content').innerHTML='<div class="status"><div class="big">Errore</div>Impossibile caricare i sounds.</div>';}
}
function renderSounds(c){
  if(!state.soundsFeed){c.innerHTML='<div class="status"><div class="big">Sintonizzo<em>…</em></div>Carico i sounds.</div>';return;}
  if(sLocked(state.soundWindow)){
    const wm=sWindowMeta(state.soundWindow);
    c.innerHTML=`<div class="lockbox"><div class="lockbox-head"><span>CAT. PREMIUM / ${esc(wm?wm.label:"").toUpperCase()}</span><span>SOUNDS</span></div>
      <div class="lockbox-body"><div class="ic">${ic("lock")}</div><h3>${esc(wm?wm.label:"")} — Premium</h3>
      <p>I sound trending <b>24h</b> e <b>7 giorni</b> sono Premium: cogli il suono <b>prima</b> che esploda.</p>
      <button class="demo" id="sDemo">Sblocca in modalità demo</button></div></div>`;
    document.getElementById('sDemo').onclick=()=>{setPremium(true);render();};return;
  }
  const ids=(state.soundsFeed.charts?.[state.soundWindow])||[];
  let rows=ids.map(id=>state.soundsFeed.sounds[id]).filter(Boolean);
  if(state.soundQ){const q=state.soundQ.toLowerCase();rows=rows.filter(s=>(s.name||"").toLowerCase().includes(q)||(s.song_name||"").toLowerCase().includes(q)||(s.artist||"").toLowerCase().includes(q));}
  if(!rows.length){c.innerHTML=`<div class="status"><div class="big">Nessun<em> match</em></div>Nessun sound trovato.</div>`;return;}
  c.innerHTML='<div class="list">'+rows.map((s,i)=>soundCardHTML(s,ids.indexOf(s.id)+1,i)).join('')+'</div>';
  c.querySelectorAll('[data-sound]').forEach(el=>el.addEventListener('click',e=>{if(e.target.closest('[data-play]'))return;const s=state.soundsFeed.sounds[el.dataset.sound];if(s&&s.official_link)window.open(s.official_link,"_blank");}));
  c.querySelectorAll('[data-play]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();togglePlay(el.dataset.play);}));
}
function soundCardHTML(s,rank,index){
  const cover=s.image_url?`style="background-image:url('${esc(s.image_url)}')"`:"";
  const playing=state.playingId===s.id;
  const play=s.play_url?`<div class="play" data-play="${esc(s.id)}">${ic(playing?"pause":"play")}</div>`:"";
  const tier=!rank?"":(rank<=3?"tier-1":(rank<=10?"tier-2":"tier-3"));
  const rankNum=rank?pad2(rank):"—";
  const coord=coordOf({id:s.id,name:s.name});
  const meta=[];if((s.views||0)>0)meta.push(`VIEWS <b>${fmt(s.views)}</b>`);if((s.likes||0)>0)meta.push(`LIKE <b>${fmt(s.likes)}</b>`);if((s.video_24h||0)>0)meta.push(`24H <b>${fmt(s.video_24h)}</b>`);
  const metaHTML=meta.slice(0,3).map((b,i)=>i>0?`<span class="sep">/</span><span>${b}</span>`:`<span>${b}</span>`).join('');
  const sub=s.song_name?esc(s.song_name)+(s.artist?" — "+esc(s.artist):""):esc(s.creator||"");
  return `<div class="card sound ${tier} ${playing?'playing':''}" data-sound="${esc(s.id)}" style="--i:${index||0}">
    <div class="rankblock"><div class="cat">T${pad3(rank)}</div><div class="rank">${rankNum}</div><div class="cover" ${cover}>${play}</div></div>
    <div class="cbody">
      <div class="ctop"><span class="coord"><span class="or">●</span> RR.T04.S${pad3(rank)} <span class="sep">/</span> <span class="bl">${esc(coord)}</span></span></div>
      <div class="name">${esc(s.name||s.song_name||"Sound")}</div>
      <div class="artist-name">${sub}</div>
      <div class="pillrow"><span class="metricpill">${sHeadline(s)}</span><span class="hexlabel">TIKTOK</span></div>
      <div class="meta">${metaHTML}</div>
    </div>
  </div>`;
}

function filterActive(){const f=state.filter;return f.q||f.genres.size||f.labels.size||f.fresh||f.min!=null||f.max!=null;}
function buildFilterChips(){
  const lc=state.feed?.label_categories||[];
  document.getElementById('labelChips').innerHTML=lc.map(l=>`<span class="chip ${state.filter.labels.has(l.key)?'on':''}" data-label="${esc(l.key)}">${esc(l.label)}</span>`).join('')||'<span style="font-family:var(--mono);font-size:11px;color:var(--mute);">—</span>';
  const ids=chartIds();const rows=ids.map(id=>state.feed.tracks[id]).filter(Boolean);
  const genres=[...new Set(rows.flatMap(t=>t.genres||[]))].sort();
  document.getElementById('genreChips').innerHTML=genres.map(g=>`<span class="chip ${state.filter.genres.has(g)?'on':''}" data-genre="${esc(g)}">#${esc(g.replace(/\s+/g,'-'))}</span>`).join('')||'<span style="font-family:var(--mono);font-size:11px;color:var(--mute);">—</span>';
  document.querySelectorAll('[data-label]').forEach(el=>el.onclick=()=>{toggleSet(state.filter.labels,el.dataset.label);el.classList.toggle('on');syncHeader();renderRadar(document.getElementById('content'));});
  document.querySelectorAll('[data-genre]').forEach(el=>el.onclick=()=>{toggleSet(state.filter.genres,el.dataset.genre);el.classList.toggle('on');syncHeader();renderRadar(document.getElementById('content'));});
  document.querySelectorAll('[data-fresh]').forEach(el=>{el.classList.toggle('on',state.filter.fresh);el.onclick=()=>{state.filter.fresh=!state.filter.fresh;el.classList.toggle('on');syncHeader();renderRadar(document.getElementById('content'));};});
}
function toggleSet(s,k){s.has(k)?s.delete(k):s.add(k);}
function resetFilters(){state.filter={q:"",genres:new Set(),labels:new Set(),fresh:false,min:null,max:null};
  document.getElementById('searchInput').value="";document.getElementById('minVal').value="";document.getElementById('maxVal').value="";
  document.querySelectorAll('.filters .chip.on').forEach(c=>c.classList.remove('on'));syncHeader();render();}
document.getElementById('searchInput').addEventListener('input',e=>{
  const v=e.target.value.trim();
  if(state.view==="sounds"){state.soundQ=v;renderSounds(document.getElementById('content'));}
  else if(state.view==="artists"){state.artistQ=v;renderArtists(document.getElementById('content'));}
  else{state.filter.q=v;syncHeader();renderRadar(document.getElementById('content'));}
});
document.getElementById('minVal').addEventListener('input',e=>{state.filter.min=e.target.value===""?null:+e.target.value;syncHeader();renderRadar(document.getElementById('content'));});
document.getElementById('maxVal').addEventListener('input',e=>{state.filter.max=e.target.value===""?null:+e.target.value;syncHeader();renderRadar(document.getElementById('content'));});
document.getElementById('closeFiltersBtn').onclick=()=>document.getElementById('filters').classList.remove('open');
document.getElementById('resetBtn').onclick=resetFilters;

function relTime(iso){const d=new Date(iso),diff=(Date.now()-d.getTime())/1000;if(diff<3600)return Math.max(1,Math.round(diff/60))+" MIN FA";if(diff<86400)return Math.round(diff/3600)+"H FA";return Math.round(diff/86400)+"G FA";}
function afterLoad(){
  if(!state.platform)state.platform=(platforms()[1]||platforms()[0])?.key||"spotify";
  if(!state.window)state.window=isPremium()?(windowsMeta()[0]?.key||"24h"):freeWindow();
  buildFilterChips();render();
}
async function load(force){const sub=document.getElementById('sub');
  try{if(force&&sub)sub.innerHTML=`<span class="live"><span class="dot"></span>SYNC</span><span>AGGIORNAMENTO…</span>`;
    const res=await fetch(FEED_URL+"?t="+Date.now(),{cache:"no-store"});if(!res.ok)throw new Error("HTTP "+res.status);
    state.feed=await res.json();try{localStorage.setItem(LS.feed,JSON.stringify(state.feed));}catch(e){}afterLoad();
  }catch(err){const cached=loadJSON(LS.feed,null);if(cached){state.feed=cached;afterLoad();}
    else if(state.view==="radar"){document.getElementById('content').innerHTML='<div class="status"><div class="big">Segnale<em> perso</em></div>Impossibile caricare il feed.<br><br><button class="primary" id="rt">↻ Riprova</button></div>';document.getElementById('rt').onclick=()=>load(true);}}}

if("serviceWorker" in navigator){
  let reloaded=false;
  navigator.serviceWorker.addEventListener("controllerchange",()=>{ if(reloaded)return; reloaded=true; location.reload(); });
  navigator.serviceWorker.register("./sw.js").then(reg=>{
    reg.update();
    setInterval(()=>reg.update(),60*60*1000); // hourly update check while open
  }).catch(()=>{});
}
render();load(false);
</script>
</body>
</html>
